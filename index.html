<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LYNX's Compiler</title>
<style>
body {
  margin: 0;
  font-family: 'Consolas', monospace;
}

/* INDEX PAGE - PREMIUM LOOK */
#indexPage {
  height: 100vh;
  background: url('Screenshot 2026-04-09 200002.png') no-repeat center/cover;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: #00f7ff;
  text-shadow: 0 0 10px rgba(0,255,255,0.7);
}

/* TITLE */
#indexPage h1 {
  font-size: 50px;
  margin-bottom: 40px;
  letter-spacing: 2px;
}

/* LANGUAGE BOX - GLASS + NEON */
.lang-box {
  border: 1px solid rgba(0,255,255,0.4);
  padding: 35px 50px;
  margin: 20px;
  border-radius: 15px;
  cursor: pointer;
  background: rgba(0, 0, 0, 0.35);
  backdrop-filter: blur(12px);
  color: #00f7ff;
  font-weight: bold;
  font-size: 18px;
  transition: all 0.3s ease;
  box-shadow: 0 0 15px rgba(0,255,255,0.2);
}

/* HOVER EFFECT */
.lang-box:hover {
  background: linear-gradient(135deg, #00f7ff, #0066ff);
  color: black;
  transform: scale(1.08);
  box-shadow: 0 0 25px #00f7ff, 0 0 50px #0066ff;
}

/* EDITOR PAGE - PREMIUM DARK */
#editorPage {
  display: none;
  height: 100vh;
  background: linear-gradient(135deg, #0a0f1c, #05070d);
  color: #d4d4d4;
}

/* TOP BAR */
#topbar {
  height: 45px;
  background: linear-gradient(90deg, #0f172a, #020617);
  display: flex;
  align-items: center;
  padding: 5px 10px;
  border-bottom: 1px solid #00f7ff33;
}

/* BUTTON STYLE */
button {
  margin-right: 10px;
  background: linear-gradient(135deg, #0ea5e9, #22c55e);
  color: black;
  border: none;
  padding: 7px 14px;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

/* BUTTON HOVER */
button:hover {
  background: linear-gradient(135deg, #22c55e, #0ea5e9);
  transform: scale(1.05);
  box-shadow: 0 0 10px #22c55e;
}

/* MAIN LAYOUT */
#main {
  display: flex;
  height: calc(100% - 45px);
}

/* FILE EXPLORER */
#explorer {
  width: 220px;
  background: linear-gradient(180deg, #020617, #020617);
  padding: 10px;
  overflow-y: auto;
  border-right: 1px solid #00f7ff22;
}

/* FILE TITLE */
#explorer h3 {
  color: #22c55e;
  border-bottom: 1px solid #22c55e44;
  padding-bottom: 5px;
}

/* FILE LIST ITEMS */
#fileList div {
  padding: 5px;
  border-radius: 5px;
  transition: 0.2s;
}

#fileList div:hover {
  background: rgba(34,197,94,0.2);
  cursor: pointer;
}

/* EDITOR PANEL */
#editor {
  width: 50%;
  height: 100%;
  border-right: 1px solid #00f7ff22;
}

/* OUTPUT PANEL */
#output {
  width: 50%;
  background: radial-gradient(circle at top, #020617, #000000);
}

/* IFRAME */
iframe {
  width: 100%;
  height: 100%;
  border: none;
}
</style>
</head>
<body>

<div id="indexPage">
  <h1>LYNX's Compiler</h1>

  <div class="lang-box" onclick="selectLang('html')">HTML / CSS / JS</div>
  <div class="lang-box" onclick="selectLang('c')">C Language</div>
</div>


<div id="editorPage">

  <div id="topbar">
    <button onclick="runCode()">▶ Run</button>
    <button onclick="openFolder()">📂 Open Folder</button>
  </div>

  <div id="main">

    <div id="explorer">
      <h3>Files</h3>
      <div id="fileList"></div>
    </div>

    <div id="editor"></div>

    <div id="output">
      <iframe id="frame"></iframe>
    </div>

  </div>
</div>


<script src="https://unpkg.com/monaco-editor@latest/min/vs/loader.js"></script>

<script>
let editor;
let currentLang = "";

function playClick() {
  new Audio("https://www.myinstants.com/media/sounds/playstation-startup.mp3").play();
}

function selectLang(lang) {
  playClick();

  currentLang = lang;

  document.getElementById("indexPage").style.display = "none";
  document.getElementById("editorPage").style.display = "block";

  loadEditor(lang);
}

function loadEditor(lang) {
  require.config({ paths: { vs: 'https://unpkg.com/monaco-editor@latest/min/vs' }});

  require(["vs/editor/editor.main"], function () {

    editor = monaco.editor.create(document.getElementById("editor"), {
      value: getStarterCode(lang),
      language: lang === "c" ? "cpp" : "html",
      theme: "vs-dark",
      fontSize: 14,
      automaticLayout: true
    });

  });
}


function getStarterCode(lang) {
  if(lang === "html") {
    return `<!DOCTYPE html>
<html>
<head>
<style>
body { background:black; color:cyan; }
</style>
</head>
<body>

<h1>Hello from LYNX Compiler</h1>

<script>
console.log("JS Running...");
<\/script>

</body>
</html>`;
  }

  if(lang === "c") {
    return `#include <stdio.h>

int main() {
    printf("Hello from LYNX Compiler!");
    return 0;
}`;
  }
}

function runCode() {
  playClick();

  let code = editor.getValue();
  let frame = document.getElementById("frame");

  try {
    if(currentLang === "html") {
      frame.srcdoc = code;
    } else {
      playError();
      alert("C execution requires backend (Node.js + GCC)");
    }
  } catch(e) {
    playError();
    alert("Code Error!");
  }
}


async function openFolder() {
  playClick();

  try {
    const dirHandle = await window.showDirectoryPicker();
    const fileList = document.getElementById("fileList");
    fileList.innerHTML = "";

    for await (const entry of dirHandle.values()) {
      const div = document.createElement("div");
      div.textContent = entry.name;
      div.style.cursor = "pointer";

      div.onclick = async () => {
        const file = await entry.getFile();
        const text = await file.text();
        editor.setValue(text);
      };

      fileList.appendChild(div);
    }

  } catch(e) {
    playError();
    console.log(e);
  }
}
</script>

</body>
</html>

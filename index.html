# JSProject
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LYNX's Compiler</title>

<style>
body {
  margin: 0;
  font-family: Consolas, monospace;
}


#indexPage {
  height: 100vh;
  background: url('Screenshot 2026-04-09 200002.png') no-repeat center/cover;
  display: flex;
  flex-direction: column;
  justify-content: right;
  align-items: left;
  color: cyan;
}

.lang-box {
  border: 2px solid cyan;
  padding: 30px;
  margin: 20px;
  border-radius: 10px;
  cursor: pointer;
  background: rgba(0,0,0,0.5);
  transition: 0.3s;
}

.lang-box:hover {
  background: cyan;
  color: black;
}


#editorPage {
  display: none;
  height: 100vh;
  background: #1e1e1e;
  color: white;
}


#topbar {
  height: 40px;
  background: #111;
  display: flex;
  align-items: center;
  padding: 5px;
}

button {
  margin-right: 10px;
  background: #222;
  color: white;
  border: none;
  padding: 6px 10px;
  cursor: pointer;
}

button:hover {
  background: cyan;
  color: black;
}


#main {
  display: flex;
  height: calc(100% - 40px);
}


#explorer {
  width: 200px;
  background: #111;
  padding: 10px;
  overflow-y: auto;
}


#editor {
  width: 50%;
  height: 100%;
}


#output {
  width: 50%;
  background: black;
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}
</style>
</head>

<body>


<div id="indexPage">
  <h1>LYNX's Compiler</h1>

  <div class="lang-box" onclick="selectLang('html')">HTML / CSS / JS</div>
  <div class="lang-box" onclick="selectLang('c')">C Language</div>
</div>


<div id="editorPage">

  <div id="topbar">
    <button onclick="runCode()">▶ Run</button>
    <button onclick="openFolder()">📂 Open Folder</button>
  </div>

  <div id="main">

    <div id="explorer">
      <h3>Files</h3>
      <div id="fileList"></div>
    </div>

    <div id="editor"></div>

    <div id="output">
      <iframe id="frame"></iframe>
    </div>

  </div>
</div>


<script src="https://unpkg.com/monaco-editor@latest/min/vs/loader.js"></script>

<script>
let editor;
let currentLang = "";

function playClick() {
  new Audio("https://www.myinstants.com/media/sounds/playstation-startup.mp3").play();
}

function selectLang(lang) {
  playClick();

  currentLang = lang;

  document.getElementById("indexPage").style.display = "none";
  document.getElementById("editorPage").style.display = "block";

  loadEditor(lang);
}

function loadEditor(lang) {
  require.config({ paths: { vs: 'https://unpkg.com/monaco-editor@latest/min/vs' }});

  require(["vs/editor/editor.main"], function () {

    editor = monaco.editor.create(document.getElementById("editor"), {
      value: getStarterCode(lang),
      language: lang === "c" ? "cpp" : "html",
      theme: "vs-dark",
      fontSize: 14,
      automaticLayout: true
    });

  });
}


function getStarterCode(lang) {
  if(lang === "html") {
    return `<!DOCTYPE html>
<html>
<head>
<style>
body { background:black; color:cyan; }
</style>
</head>
<body>

<h1>Hello from LYNX Compiler</h1>

<script>
console.log("JS Running...");
<\/script>

</body>
</html>`;
  }

  if(lang === "c") {
    return `#include <stdio.h>

int main() {
    printf("Hello from LYNX Compiler!");
    return 0;
}`;
  }
}

function runCode() {
  playClick();

  let code = editor.getValue();
  let frame = document.getElementById("frame");

  try {
    if(currentLang === "html") {
      frame.srcdoc = code;
    } else {
      playError();
      alert("C execution requires backend (Node.js + GCC)");
    }
  } catch(e) {
    playError();
    alert("Code Error!");
  }
}


async function openFolder() {
  playClick();

  try {
    const dirHandle = await window.showDirectoryPicker();
    const fileList = document.getElementById("fileList");
    fileList.innerHTML = "";

    for await (const entry of dirHandle.values()) {
      const div = document.createElement("div");
      div.textContent = entry.name;
      div.style.cursor = "pointer";

      div.onclick = async () => {
        const file = await entry.getFile();
        const text = await file.text();
        editor.setValue(text);
      };

      fileList.appendChild(div);
    }

  } catch(e) {
    playError();
    console.log(e);
  }
}
</script>

</body>
</html>
